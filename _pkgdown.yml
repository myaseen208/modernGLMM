url: https://github.com/myaseen208/modernGLMM/

template:
  bootstrap: 5
  math-rendering: mathjax
  includes:
    in_header: |
      <script>
      window.MathJax = {
        tex: {
          macros: {
            boldsymbol: ["\\pmb{#1}", 1]
          }
        }
      };
      </script>
  bslib:
    base_font:
      google: Crimson Pro
    heading_font:
      google: Crimson Pro
    code_font:
      google: JetBrains Mono
    bg: "#ffffff"
    fg: "#1a1a1a"
    primary: "#2c5f8a"
    link-color: "#2c5f8a"

navbar:
  structure:
    left:  [home, reference, articles, news]
    right: [github]

  components:
    github:
      icon: fa-github
      href: https://github.com/myaseen208/modernGLMM
      aria-label: GitHub repository

reference:
  - title: Package Overview
    contents:
      - modernGLMM-package

  - title: "Core Data and Examples"
    desc: "Datasets and executable examples from the 2024 GLMM text."
    contents:
      - starts_with("Table")
      - starts_with("Data")
      - starts_with("Exam")

articles:
  - title: "Chapter Vignettes"
    navbar: "Chapters"
    contents:
      - chapter-01-introduction
      - chapter-02-inference-basics
      - chapter-03-gaussian-glm
      - chapter-04-random-effects
      - chapter-05-mixed-model-anova
      - chapter-06-glmm-overview
      - chapter-07-inference-part-2
      - chapter-08-treatment-structures
      - chapter-09-multi-level-models
      - chapter-10-blup
      - chapter-11-count-data
      - chapter-12-rates-proportions
      - chapter-13-zero-inflated
      - chapter-14-multinomial-data
      - chapter-15-time-to-event
      - chapter-16-smoothing-splines
      - chapter-17-repeated-measures
      - chapter-18-correlated-errors
      - chapter-19-bayesian-glmm
      - chapter-20-bayesian-examples
      - chapter-21-power-sample-size
  - title: "Verification"
    navbar: "Verification"
    contents:
      - verification-summary
